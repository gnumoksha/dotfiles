[cmd_duration]
show_milliseconds = false
format = "[â‌® $duration ï‰’]($style)"
style = "fg:h5 bg:right_bg"
disabled = false
show_notifications = false
# Shortest duration for notification (in milliseconds)
min_time_to_notify = 10_000

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style)'
style = "bg:right_bg"
detect_folders = ['kubernetes', 'k8s']

[status]
disabled = false
format = '[$symbol$status]($style)'
success_symbol = ""
style = "fg:green bg:right_bg"
failure_style = "bold red bg:right_bg"

[palettes.p10k]
