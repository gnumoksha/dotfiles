Alpine = "ïŒ€"
Amazon = "ï‰°"
Android = "îœژ"
AOSC = "ïŒپ"
Arch = "َ°£‡"
Artix = "َ°£‡"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[username]
show_always = false
style_user = "bg:os_bg fg:left_fg"
style_root = "bg:os_bg fg:left_fg"
format = '[ $user]($style)'

[sudo]
disabled = false
format = '[$symbol]($style)'
style = "bg:os_bg fg:left_fg"

[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
truncation_length = 3
truncation_symbol = "â€¦/"
# I think this isn't working
# https://github.com/starship/starship/discussions/7264
fish_style_pwd_dir_length = 3
# Whether or not to truncate to the root of the git repo that you're currently in.
truncate_to_repo = false
# style = "fg:bold h1 bg:left_bg"
style = "bg:dir_bg fg:left_fg"
# I think this isn't working
before_repo_root_style = 'fg:h5'

[directory.substitutions]
"Documents" = "َ°ˆ™"
"Downloads" = "ï€™"
"Music" = "َ°‌ڑ"
"Pictures" = "ï€¾"
# "dev" = "َ°²‹"

[git_branch]
symbol = "ïگک"
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:left_fg bg:git_bg)]($style)'

[git_status]
ahead = "â‡،${count}"
behind = "â‡£${count}"
conflicted = 'î¬؛$count'
deleted = "ï€چ "
diverged = 'â†‘$ahead_countâ†“$behind_count'
modified = "َ±‡¬ "
renamed = "ïپ، "
staged = "َ°‌’ "
stashed = "َ°¬² "
untracked = "? "
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:left_fg bg:git_bg)]($style)'

[nodejs]
symbol = "îœک"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[c]
symbol = "îک‍ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[rust]
symbol = "î‍¨"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[golang]
symbol = "îک§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[php]
symbol = "îکˆ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[java]
symbol = "î‰– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[kotlin]
symbol = "îک´"
style = "bg:green"
