# #dotfiles: dst=$XDG_CONFIG_HOME/starship.toml
# Based on https://starship.rs/presets/catppuccin-powerline (catppuccin_latte)

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

continuation_prompt = '[ÔûÂ](bright-black) '

format = """
$os\
$username\
$sudo\
$hostname\
[¯é░](bg:dir_bg fg:os_bg)\
$directory\
[¯é░](bg:git_bg fg:peach)\
$git_branch\
$git_status\
[¯é░](fg:git_bg bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░ ](fg:green)\
$line_break\
$character"""

right_format = """
[¯é▓](fg:right_bg)\
$kubernetes\
$jobs\
$status\
$cmd_duration\
$time"""

# Disable the blank line at the start of the prompt
add_newline = false

palette = 'p10k'

[os]
disabled = false
style = "bg:os_bg fg:left_fg"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = false
style_user = "bg:red fg:left_fg"
style_root = "bg:red fg:left_fg"
format = '[ $user]($style)'

[sudo]
disabled = false
format = '[$symbol]($style)'
style = "bg:red fg:left_fg"

[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
# I think this isn't working
fish_style_pwd_dir_length = 3
# Whether or not to truncate to the root of the git repo that you're currently in.
truncate_to_repo = false
# style = "fg:bold h1 bg:left_bg"
style = "bg:dir_bg fg:left_fg"
# I think this isn't working
before_repo_root_style = 'fg:h5'

[directory.substitutions]
"Documents" = "¾░êÖ"
"Downloads" = "´ÇÖ"
"Music" = "¾░ØÜ"
"Pictures" = "´Ç¥"
# "dev" = "¾░▓ï"

[git_branch]
symbol = "´Éİ"
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:left_fg bg:git_bg)]($style)'

[git_status]
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:left_fg bg:git_bg)]($style)'

[nodejs]
symbol = "¯£İ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[c]
symbol = "¯İŞ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[rust]
symbol = "¯Ş¿"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[golang]
symbol = "¯İğ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[php]
symbol = "¯İê"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[java]
symbol = "¯ëû "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[kotlin]
symbol = "¯İ┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[haskell]
symbol = "¯İş"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[python]
symbol = "¯İå"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:left_fg bg:green)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:left_fg bg:sapphire)]($style)'

[conda]
symbol = " ´äî "
style = "fg:left_fg bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'

[time]
disabled = false
time_format = "ÔØ« %T"
style = "fg:#5f8787 bg:right_bg"
format = '[ $time ´Çù ]($style)'

[cmd_duration]
show_milliseconds = true
format = "[ÔØ« $duration ´ëÆ]($style)"
style = "fg:h5 bg:right_bg"
disabled = false
show_notifications = false
# Shortest duration for notification (in milliseconds)
min_time_to_notify = 10_000

[kubernetes]
disabled = false
style = "bg:right_bg"

[status]
disabled = false
format = '[$symbol$status]($style)'
success_symbol = ""
style = "fg:green bg:right_bg"
failure_style = "bold red bg:right_bg"

