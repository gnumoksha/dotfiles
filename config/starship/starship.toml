# Based on https://starship.rs/presets/catppuccin-powerline (catppuccin_latte)

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

continuation_prompt = '[â–¶](bright-black) '

format = """
$os\
$username\
$sudo\
$hostname\
[î‚°](bg:dir_bg fg:os_bg)\
$directory\
[î‚°](bg:git_bg fg:peach)\
$git_branch\
$git_status\
[î‚°](fg:git_bg bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[î‚° ](fg:green)\
$line_break\
$character"""

right_format = """
[î‚²](fg:right_bg)\
$kubernetes\
$jobs\
$status\
$cmd_duration\
$time"""

# Disable the blank line at the start of the prompt
add_newline = false

palette = 'p10k'

[os]
disabled = false
style = "bg:os_bg fg:left_fg"

[os.symbols]
Windows = "îœڈ"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
