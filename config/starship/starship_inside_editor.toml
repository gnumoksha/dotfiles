# Config for terminals inside text editors or IDEs

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

continuation_prompt = '[▶](bright-black) '

format = """
$username\
$sudo\
$directory\
[](bg:git_bg fg:peach)\
$git_branch\
$git_status\
[](fg:git_bg bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[ ](fg:green)\
$line_break\
$character"""

right_format = """
$status\
$jobs"""

# Disable the blank line at the start of the prompt
add_newline = false

palette = 'p10k'

[username]
show_always = false
style_user = "bg:os_bg fg:left_fg"
style_root = "bg:os_bg fg:left_fg"
format = '[ $user]($style)'

[sudo]
disabled = false
format = '[$symbol]($style)'
style = "bg:os_bg fg:left_fg"

[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
truncation_length = 1
truncation_symbol = "…/"
# I think this isn't working
# https://github.com/starship/starship/discussions/7264
fish_style_pwd_dir_length = 3
# Whether or not to truncate to the root of the git repo that you're currently in.
truncate_to_repo = false
# style = "fg:bold h1 bg:left_bg"
style = "bg:dir_bg fg:left_fg"
# I think this isn't working
before_repo_root_style = 'fg:h5'

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
# "dev" = "󰲋"

[git_branch]
symbol = ""
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:left_fg bg:git_bg)]($style)'

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
conflicted = '$count'
deleted = " "
diverged = '↑$ahead_count↓$behind_count'
modified = "󱇬 "
renamed = " "
staged = "󰝒 "
stashed = "󰬲 "
untracked = "? "
style = "bg:git_bg"
format = '[[($all_status$ahead_behind )](fg:left_fg bg:git_bg)]($style)'

[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[c]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[golang]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[php]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[haskell]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:left_fg bg:green)]($style)'

[python]
# not useful because https://github.com/starship/starship/discussions/7473
disabled = true
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:left_fg bg:green)]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:left_fg bg:sapphire)]($style)'

[conda]
symbol = "  "
style = "fg:left_fg bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[status]
disabled = false
format = '[$symbol$status]($style)'
success_symbol = ""
style = "fg:green bg:right_bg"
failure_style = "bold red bg:right_bg"

[palettes.p10k]
os_bg = "#d20f39"
red = "#d20f39"
peach = "#c84e08"
yellow = "#df8e1d"
green = "#40a02b"
sapphire = "#209fb5"
lavender = "#7287fd"
left_fg = "#dce0e8"
dir_fg = "#FFFFFF"
dir_bg = "#c84e08"
git_bg = "#079040"
h1 = "#0d8ec9"
h5 = "#a7a7a7"
left_bg = "#303030"
right_bg = "#303030"
right_fg = "#5e8585"

# #dotfiles: dst=$XDG_CONFIG_HOME/starship/starship_inside_editor.toml
