[general]
live_config_reload = true
import = ["themes/monokay-dark-modified.toml"]

[colors]
draw_bold_text_with_bright_colors = true

[cursor]
unfocused_hollow = true

[cursor.style]
blinking = "On"
shape = "Beam"

[env]
TERM = "xterm-256color"

[font]
size = 15.0

[font.bold]
style = "Bold"

[font.bold_italic]
style = "Bold Italic"

[font.italic]
style = "Italic"

[font.normal]
#family: Droid Sans Mono Slashed for Powerline
#family: FiraMono Nerd Font Mono
family = "MesloLGS Nerd Font Mono"
style = "Regular"

[scrolling]
history = 30000

[window]
decorations = "none"
dynamic_padding = false
dynamic_title = true
startup_mode = "Maximized"
# opacity = 0.8
# blur = true
